<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM App Explorer — Privasys</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Connection screen */
        .connect-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 57px);
            padding: 24px;
        }
        .connect-card {
            width: 100%;
            max-width: 560px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }
        .connect-card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .connect-card .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .connect-card label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .connect-card input {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            font-family: var(--mono);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--input-bg);
            color: var(--fg);
            outline: none;
            margin-bottom: 16px;
        }
        .connect-card input:focus { border-color: var(--blue); }
        .connect-card .or-separator {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            margin: -8px 0 16px;
            position: relative;
        }
        .connect-card .or-separator::before,
        .connect-card .or-separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 20px);
            height: 1px;
            background: var(--border);
        }
        .connect-card .or-separator::before { left: 0; }
        .connect-card .or-separator::after { right: 0; }
        .connect-card .connect-btn {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--fg);
            color: var(--bg);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .connect-card .connect-btn:hover { opacity: 0.85; }
        .connect-card .example {
            margin-top: 16px;
            font-size: 11px;
            color: var(--muted);
        }
        .connect-card .example code {
            display: block;
            margin-top: 4px;
            padding: 6px 10px;
            background: var(--code-bg);
            border-radius: 6px;
            font-size: 11px;
            word-break: break-all;
        }

        /* Show/hide based on connected state */
        body:not(.connected) #connected-view { display: none; }
        body.connected .connect-screen { display: none; }
        body:not(.connected) .header-connected { display: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <a class="logo" href="#">
            <!-- Privasys shield logo (inline SVG) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l7 4v5c0 5.25-3.5 9.74-7 11-3.5-1.26-7-5.75-7-11V6l7-4z"/>
                <path d="M9.5 12l2 2 3.5-4" stroke-width="2"/>
            </svg>
            WASM App Explorer
        </a>
        <span class="sep"></span>
        <span class="header-connected text-xs text-muted" id="connection-info"></span>
        <button class="header-connected btn btn-outline btn-sm" style="margin-left:auto" onclick="location.reload()">Disconnect</button>
    </header>

    <!-- Connection screen -->
    <div class="connect-screen">
        <div class="connect-card">
            <h2>Connect to a WASM App</h2>
            <p class="subtitle">Enter the management service URL to explore a deployed WASM application's attestation and API.</p>

            <label for="endpoint-input-full">Full endpoint URL</label>
            <input type="text" id="endpoint-input" placeholder="https://api.developer.privasys.org/api/v1/apps/wasm-app-example">

            <div class="or-separator">or</div>

            <label>Base URL</label>
            <input type="text" id="base-url-input" placeholder="https://api.developer.privasys.org">

            <label>App name</label>
            <input type="text" id="app-name-input" placeholder="wasm-app-example">

            <button class="connect-btn" id="connect-btn">Connect</button>

            <div class="example">
                <strong>Examples:</strong>
                <code>https://api.developer.privasys.org/api/v1/apps/wasm-app-example</code>
            </div>
        </div>
    </div>

    <!-- Connected view -->
    <div id="connected-view">
        <div class="main-content" id="tab-container"></div>
    </div>

    <script src="explorer.js"></script>
</body>
</html>
