#
# Reproducible enclave build + MRENCLAVE extraction on release.
#
# Triggers (the tag prefix selects the flavor):
#   - v*       → base  (no optional modules)
#   - wasm-v*  → wasm  (WASM runtime + FIDO2)
#
# Vault flavor is built out-of-tree by the enclave-vaults repo using its own
# composition crate; it is not produced here.
#
# Outputs (per flavor):
#   - enclave.signed.so     — Signed enclave binary
#   - enclave-os-host       — Host binary
#   - mrenclave.txt         — Hex-encoded MRENCLAVE
#   - build-manifest.json   — Full build metadata (versions, hashes, flavor)
#   - All artifacts attached to the GitHub Release.

name: Build & Release

on:
  push:
    tags:
      - "v*"
      - "wasm-v*"
  # PR gate: the enclave crate only compiles inside the SGX build
  # container, so without this the first compile of a PR's code happens
  # on the release tag (wasm-v0.31.0 needed three tag re-points for a
  # stale lockfile and a flavor-gated compile error). PRs build the
  # wasm flavor end-to-end but skip the release upload.
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor"
        type: choice
        default: wasm
        options: [base, wasm]

permissions:
  contents: write      # create releases + upload assets
  packages: write      # push Docker image

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: privasys/enclave-os-mini/build

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 0. Resolve flavor + version from the triggering tag
  # ────────────────────────────────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      flavor: ${{ steps.r.outputs.flavor }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        run: |
          REF='${{ github.ref_name }}'
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
              FLAVOR='${{ inputs.flavor }}'
              VERSION="${REF}"
          elif [ '${{ github.event_name }}' = 'pull_request' ]; then
              FLAVOR=wasm
              VERSION="pr-${{ github.event.pull_request.number }}"
          elif [[ "${REF}" == wasm-v* ]]; then
              FLAVOR=wasm
              VERSION="${REF#wasm-}"
          elif [[ "${REF}" == v* ]]; then
              FLAVOR=base
              VERSION="${REF}"
          else
              echo "ERROR: tag '${REF}' does not match v* or wasm-v*" >&2
              exit 1
          fi
          echo "flavor=${FLAVOR}"   | tee -a "$GITHUB_OUTPUT"
          echo "version=${VERSION}" | tee -a "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────
  # 1. Build the Docker build-environment image (cached via GHCR)
  # ────────────────────────────────────────────────────────────────────────
  build-image:
    # PRs reuse the cached :latest build image from GHCR instead of
    # pushing a fresh one (no package write from PR context).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ────────────────────────────────────────────────────────────────────────
  # 2. Build the enclave inside the reproducible container
  # ────────────────────────────────────────────────────────────────────────
  build-enclave:
    needs: [resolve, build-image]
    if: always() && needs.resolve.result == 'success' && (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build enclave in container (flavor=${{ needs.resolve.outputs.flavor }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e CARGO_INCREMENTAL=0 \
            -e SOURCE_DATE_EPOCH=0 \
            -e FLAVOR='${{ needs.resolve.outputs.flavor }}' \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Fix build output permissions
        run: sudo chown -R "$(id -u):$(id -g)" build/ target/

      - name: Read MRENCLAVE
        id: mrenclave
        run: |
          MRENCLAVE=$(cat build/mrenclave.txt)
          echo "mrenclave=${MRENCLAVE}" >> "$GITHUB_OUTPUT"
          echo "## ${{ needs.resolve.outputs.flavor }} — MRENCLAVE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${MRENCLAVE}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate build manifest
        run: |
          cat > build/build-manifest.json <<EOF
          {
            "flavor": "${{ needs.resolve.outputs.flavor }}",
            "version": "${{ needs.resolve.outputs.version }}",
            "tag": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "mrenclave": "$(cat build/mrenclave.txt)",
            "enclave_so_sha256": "$(sha256sum build/bin/enclave.so | cut -d' ' -f1)",
            "signed_enclave_sha256": "$(sha256sum build/bin/enclave.signed.so | cut -d' ' -f1)",
            "host_sha256": "$(sha256sum target/release/enclave-os-host 2>/dev/null | cut -d' ' -f1 || echo 'N/A')",
            "build_image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build/build-manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: enclave-build-${{ needs.resolve.outputs.flavor }}
          path: |
            build/bin/enclave.signed.so
            build/mrenclave.txt
            build/build-manifest.json
            target/release/enclave-os-host

  # ────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release (only on tag push)
  # ────────────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [resolve, build-enclave]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: enclave-build-${{ needs.resolve.outputs.flavor }}
          path: artifacts/

      - name: Read MRENCLAVE
        id: mrenclave
        run: echo "mrenclave=$(cat artifacts/build/mrenclave.txt)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ github.ref_name }} (${{ needs.resolve.outputs.flavor }})"
          body: |
            ## enclave-os-mini ${{ github.ref_name }}

            **Flavor:** `${{ needs.resolve.outputs.flavor }}`
            **Source version:** `${{ needs.resolve.outputs.version }}`

            ### MRENCLAVE
            ```
            ${{ steps.mrenclave.outputs.mrenclave }}
            ```

            ### Verify the build
            ```bash
            git checkout ${{ github.ref_name }}
            docker build -f docker/Dockerfile.build -t enclave-build .
            docker run --rm -v $(pwd):/src -e FLAVOR=${{ needs.resolve.outputs.flavor }} enclave-build
            cat build/mrenclave.txt
            ```

            ### Build Manifest
            See `build-manifest.json` for full reproducibility metadata.
          files: |
            artifacts/build/bin/enclave.signed.so
            artifacts/build/mrenclave.txt
            artifacts/build/build-manifest.json
            artifacts/target/release/enclave-os-host
