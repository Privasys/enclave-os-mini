#
# Reproducible enclave build + MRENCLAVE extraction on release.
#
# Triggers:
#   - Push a tag matching v*  (e.g. v0.3.0)
#   - Manual dispatch
#
# Outputs:
#   - enclave.signed.so     — Signed enclave binary
#   - enclave-os-host       — Host binary
#   - mrenclave.txt         — Hex-encoded MRENCLAVE
#   - build-manifest.json   — Full build metadata (versions, hashes)
#   - All artifacts are attached to the GitHub Release.

name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      enable_vault:
        description: "Enable vault module"
        type: boolean
        default: true

permissions:
  contents: write      # create releases + upload assets
  packages: write      # push Docker image (optional)

env:
  REGISTRY: ghcr.io
  # github.repository may contain uppercase chars; Docker requires lowercase.
  IMAGE_NAME: privasys/enclave-os-mini/build

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Build the Docker build-environment image (cached via GHCR)
  # ────────────────────────────────────────────────────────────────────────
  build-image:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ────────────────────────────────────────────────────────────────────────
  # 2. Build the enclave inside the reproducible container
  # ────────────────────────────────────────────────────────────────────────
  build-enclave:
    needs: build-image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for git describe

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build enclave in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e CARGO_INCREMENTAL=0 \
            -e SOURCE_DATE_EPOCH=0 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Fix build output permissions
        run: sudo chown -R "$(id -u):$(id -g)" build/ target/

      - name: Read MRENCLAVE
        id: mrenclave
        run: |
          MRENCLAVE=$(cat build/mrenclave.txt)
          echo "mrenclave=${MRENCLAVE}" >> "$GITHUB_OUTPUT"
          echo "## MRENCLAVE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${MRENCLAVE}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate build manifest
        run: |
          cat > build/build-manifest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "mrenclave": "$(cat build/mrenclave.txt)",
            "enclave_so_sha256": "$(sha256sum build/bin/enclave.so | cut -d' ' -f1)",
            "signed_enclave_sha256": "$(sha256sum build/bin/enclave.signed.so | cut -d' ' -f1)",
            "host_sha256": "$(sha256sum target/release/enclave-os-host 2>/dev/null | cut -d' ' -f1 || echo 'N/A')",
            "build_image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build/build-manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enclave-build
          path: |
            build/bin/enclave.signed.so
            build/mrenclave.txt
            build/build-manifest.json
            target/release/enclave-os-host

  # ────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release (only on tag push)
  # ────────────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-enclave
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: enclave-build
          path: artifacts/

      - name: Read MRENCLAVE
        id: mrenclave
        run: echo "mrenclave=$(cat artifacts/build/mrenclave.txt)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## enclave-os-mini ${{ github.ref_name }}

            ### MRENCLAVE
            ```
            ${{ steps.mrenclave.outputs.mrenclave }}
            ```

            ### Verify the build
            Anyone can reproduce this MRENCLAVE using the build container:
            ```bash
            git checkout ${{ github.ref_name }}
            docker build -f docker/Dockerfile.build -t enclave-build .
            docker run --rm -v $(pwd):/src enclave-build
            cat build/mrenclave.txt
            ```

            ### Build Manifest
            See `build-manifest.json` for full reproducibility metadata.
          files: |
            artifacts/build/bin/enclave.signed.so
            artifacts/build/mrenclave.txt
            artifacts/build/build-manifest.json
            artifacts/target/release/enclave-os-host
